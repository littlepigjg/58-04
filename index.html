<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>离线邮件模板编辑器</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="app-header">
        <h1>📧 邮件模板编辑器</h1>
        <div class="header-actions">
            <button id="btn-import-json" class="btn btn-secondary">📂 导入JSON</button>
            <button id="btn-export-json" class="btn btn-secondary">💾 保存JSON</button>
            <button id="btn-export-html" class="btn btn-primary">📤 导出HTML</button>
            <input type="file" id="file-import" accept=".json" style="display:none">
        </div>
    </header>

    <main class="app-main">
        <aside class="sidebar-left">
            <h2>组件库</h2>
            <div id="component-list" class="component-list"></div>
            <div style="padding:12px;border-top:1px solid #e5e7eb;margin-top:12px;">
                <button id="btn-reset-storage" class="btn btn-small btn-danger" style="width:100%;">🔄 重置本地缓存</button>
            </div>
        </aside>

        <section class="editor-area">
            <div class="editor-toolbar">
                <span class="toolbar-title">编辑区</span>
                <button id="btn-clear" class="btn btn-small btn-danger">清空</button>
            </div>
            <div id="editor-canvas" class="editor-canvas">
                <div class="empty-hint">
                    <p>👈 从左侧拖拽组件到这里开始编辑</p>
                </div>
            </div>
        </section>

        <aside class="sidebar-right">
            <div class="sidebar-tabs">
                <button class="sidebar-tab active" data-tab="preview">
                    <span class="tab-icon">👁️</span>
                    <span class="tab-label">预览</span>
                </button>
                <button class="sidebar-tab" data-tab="templates">
                    <span class="tab-icon">📚</span>
                    <span class="tab-label">模板库</span>
                </button>
                <button class="sidebar-tab" data-tab="properties">
                    <span class="tab-icon">⚙️</span>
                    <span class="tab-label">属性</span>
                </button>
            </div>

            <div class="sidebar-tab-content active" data-tab-content="preview">
                <div class="preview-toolbar">
                    <span class="toolbar-title">实时预览</span>
                    <div class="view-toggle">
                        <button id="btn-view-desktop" class="btn btn-small btn-toggle active" data-view="desktop">
                            💻 桌面
                        </button>
                        <button id="btn-view-mobile" class="btn btn-small btn-toggle" data-view="mobile">
                            📱 手机
                        </button>
                    </div>
                </div>
                <div id="preview-container" class="preview-container view-desktop">
                    <iframe id="preview-iframe" class="preview-iframe"></iframe>
                </div>
            </div>

            <div class="sidebar-tab-content" data-tab-content="templates">
                <div class="template-library-header">
                    <div class="template-library-actions">
                        <button id="btn-save-as-template" class="btn btn-small btn-primary" style="background:#667eea;color:white;">
                            💾 保存为模板
                        </button>
                    </div>
                    <div class="template-search-box">
                        <input type="text" id="template-search" placeholder="🔍 搜索模板名称或标签...">
                    </div>
                    <div class="template-category-filter">
                        <button class="category-filter-btn active" data-category="全部">全部</button>
                        <button class="category-filter-btn" data-category="预设模板">预设</button>
                        <button class="category-filter-btn" data-category="营销推广">营销</button>
                        <button class="category-filter-btn" data-category="通知确认">通知</button>
                        <button class="category-filter-btn" data-category="活动邀请">邀请</button>
                        <button class="category-filter-btn" data-category="账户安全">安全</button>
                        <button class="category-filter-btn" data-category="自定义">自定义</button>
                    </div>
                </div>
                <div id="template-grid" class="template-grid">
                </div>
            </div>

            <div class="sidebar-tab-content" data-tab-content="properties">
                <div class="properties-panel" style="border-top:none;height:100%;">
                    <h3>属性面板</h3>
                    <div id="properties-content" class="properties-content">
                        <p class="empty-hint">点击组件编辑属性</p>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <script src="js/components.js"></script>
    <script src="js/templateEngine.js"></script>
    <script src="js/blockList.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/preview.js"></script>
    <script src="js/io.js"></script>
    <script src="js/templateLibrary.js"></script>
    <script src="js/app.js"></script>

    <div id="template-modal-overlay" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">提示</h3>
                <button class="modal-close-btn" id="modal-close-btn">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
            </div>
            <div class="modal-footer" id="modal-footer">
            </div>
        </div>
    </div>

    <div id="template-context-menu" class="context-menu hidden">
        <div class="context-menu-item" data-action="apply">
            <span class="context-menu-icon">📋</span>
            <span class="context-menu-label">应用模板</span>
        </div>
        <div class="context-menu-item" data-action="rename" data-only-custom="true">
            <span class="context-menu-icon">✏️</span>
            <span class="context-menu-label">重命名</span>
        </div>
        <div class="context-menu-item" data-action="export">
            <span class="context-menu-icon">📤</span>
            <span class="context-menu-label">导出模板</span>
        </div>
        <div class="context-menu-divider" data-only-custom="true"></div>
        <div class="context-menu-item context-menu-danger" data-action="delete" data-only-custom="true">
            <span class="context-menu-icon">🗑️</span>
            <span class="context-menu-label">删除模板</span>
        </div>
    </div>
</body>
</html>
